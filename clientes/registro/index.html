<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Regístrate en el Portal de Clientes de Kaleidoscopio para gestionar tus servicios contratados." />
    <title>Kaleidoscopio | Registro de Clientes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../assets/css/styles.css" />
    <link rel="stylesheet" href="../css/clientes-styles.css" />
  </head>
  <body class="client-auth-body">
    <div class="neon-particles" aria-hidden="true"></div>

    <div class="client-auth-card">
      <div class="client-auth-logo">
        <img src="../../assets/img/logo.jpg" alt="Kaleidoscopio Logo" />
        <div>
          <h2>Registro de Clientes</h2>
          <p>Crea tu cuenta de acceso al portal de servicios</p>
        </div>
      </div>

      <!-- Alertas de estado -->
      <div class="error-message-box" id="errorMsgBox"></div>
      <div class="success-message-box" id="successMsgBox">Registro exitoso. Redirigiendo...</div>

      <form id="registroForm" style="display: flex; flex-direction: column; gap: 1.25rem;">
        
        <!-- Información Personal -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group" style="margin-bottom: 0;">
            <label for="fullName">Nombre Completo</label>
            <input type="text" id="fullName" class="form-control" placeholder="Ej. Ana Ramos" required />
          </div>
          <div class="form-group" style="margin-bottom: 0;">
            <label for="companyName">Empresa o Proyecto</label>
            <input type="text" id="companyName" class="form-control" placeholder="Ej. Ramos Consultores" required />
          </div>
        </div>

        <!-- Ubicación -->
        <div class="form-group" style="margin-bottom: 0;">
          <label for="city">Ciudad</label>
          <input type="text" id="city" class="form-control" placeholder="Ej. Guadalajara" required />
        </div>

        <!-- Contacto y Confirmación -->
        <div class="form-group" style="margin-bottom: 0;">
          <label for="email">Correo Electrónico</label>
          <input type="email" id="email" class="form-control" placeholder="correo@ejemplo.com" required autocomplete="username" />
        </div>

        <div class="form-group" style="margin-bottom: 0;">
          <label for="confirmEmail">Confirmación de Correo</label>
          <input 
            type="email" 
            id="confirmEmail" 
            class="form-control" 
            placeholder="Repite tu correo" 
            required 
            autocomplete="off" 
            onpaste="return false;" 
            ondrop="return false;"
          />
          <span id="emailError" style="font-size: 0.8rem; color: var(--red); display: none; margin-top: 0.25rem;">
            Los correos electrónicos no coinciden.
          </span>
        </div>

        <!-- Seguridad y Confirmación -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group" style="margin-bottom: 0;">
            <label for="password">Contraseña</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="new-password" />
          </div>
          
          <div class="form-group" style="margin-bottom: 0;">
            <label for="confirmPassword">Confirmación de Contraseña</label>
            <input 
              type="password" 
              id="confirmPassword" 
              class="form-control" 
              placeholder="Repite la contraseña" 
              required 
              autocomplete="off" 
              onpaste="return false;" 
              ondrop="return false;"
            />
          </div>
        </div>
        
        <span id="passwordError" style="font-size: 0.8rem; color: var(--red); display: none; margin-top: -0.5rem; text-align: right;">
          Las contraseñas no coinciden.
        </span>

        <button type="submit" class="glow-button" id="submitBtn" style="width: 100%; justify-content: center; margin-top: 1rem;">
          Registrar Cuenta
        </button>
      </form>

      <div class="auth-footer-link">
        ¿Ya tienes cuenta? <a href="../login/">Inicia sesión aquí</a>
      </div>
    </div>

    <!-- Scripts de Supabase y Controladores -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../admin/js/config.js" onerror="console.log('Sin archivo config.js')"></script>
    <script src="../js/clientes-common.js"></script>
    <script src="../js/registro.js"></script>
  </body>
</html>
