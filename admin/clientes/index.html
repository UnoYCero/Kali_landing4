<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Kaleidoscopio | Administración de Clientes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../assets/css/styles.css" />
    <link rel="stylesheet" href="../css/admin-styles.css" />
    <link rel="icon" href="../../assets/img/logo.png" type="image/png" />
  </head>
  <body class="admin-layout">
    <div class="neon-particles" aria-hidden="true"></div>

    <!-- Botón hamburguesa móvil -->
    <button class="admin-menu-toggle" id="adminMenuToggle" aria-expanded="false" aria-label="Abrir menú de navegación">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>

    <div class="admin-container">
      <!-- SIDEBAR -->
      <aside class="admin-sidebar" id="adminSidebar">
        <div class="admin-sidebar-header">
          <div class="admin-sidebar-brand">
            <img src="../../assets/img/logo.png" alt="Kaleidoscopio Logo" />
            <div class="admin-sidebar-brand-text">
              <span class="admin-sidebar-brand-name">Kaleidoscopio</span>
              <span class="admin-sidebar-brand-sub">Panel Admin</span>
            </div>
          </div>
        </div>

        <nav class="admin-sidebar-nav">
          <a href="../dashboard/" class="admin-nav-item">
            <!-- Icono Dashboard -->
            <svg viewBox="0 0 24 24">
              <rect x="3" y="3" width="7" height="9" rx="1"></rect>
              <rect x="14" y="3" width="7" height="5" rx="1"></rect>
              <rect x="14" y="12" width="7" height="9" rx="1"></rect>
              <rect x="3" y="16" width="7" height="5" rx="1"></rect>
            </svg>
            Dashboard
          </a>
          <a href="../prospectos/" class="admin-nav-item">
            <!-- Icono CRM / Prospectos -->
            <svg viewBox="0 0 24 24">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
            Prospectos
          </a>
          <a href="./" class="admin-nav-item active">
            <!-- Icono Clientes (Usuario) -->
            <svg viewBox="0 0 24 24">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            Clientes
          </a>
          <a href="../cuentas/" class="admin-nav-item">
            <!-- Icono Gestión de Cuentas (Reloj/Tiempo) -->
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            Gestión de Cuentas
          </a>
        </nav>

        <div class="admin-sidebar-footer">
          <button class="btn-logout" id="logoutBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            Cerrar Sesión
          </button>
        </div>
      </aside>

      <!-- CONTENIDO PRINCIPAL -->
      <main class="admin-main">
        <!-- BARRA SUPERIOR -->
        <header class="admin-topbar">
          <div class="admin-topbar-title">
            <h1>Clientes</h1>
            <p>Directorio centralizado de clientes del ecosistema</p>
          </div>
        </header>

        <!-- FILTROS, BUSCADOR Y ORDENAMIENTO -->
        <section class="crm-filters-bar" style="justify-content: space-between;">
          <!-- Buscador -->
          <div style="display: flex; align-items: center; gap: 0.5rem; flex-grow: 1; max-width: 400px;">
            <input 
              type="text" 
              id="searchClient" 
              class="form-control" 
              placeholder="Buscar por nombre, empresa o correo..." 
              style="width: 100%;"
            />
          </div>

          <!-- Controles de ordenamiento y visualización -->
          <div style="display: flex; align-items: center; gap: 1rem;">
            <div style="display: flex; align-items: center; gap: 0.5rem;">
              <label for="orderBy" style="font-size: 0.85rem; font-weight:600; text-transform: uppercase; color: var(--muted); white-space: nowrap;">Ordenar por:</label>
              <select id="orderBy" class="form-control" style="padding: 0.5rem 2rem 0.5rem 1rem; font-size: 0.85rem; width: 180px;">
                <option value="fecha_registro-desc">Fecha (Reciente)</option>
                <option value="fecha_registro-asc">Fecha (Antiguo)</option>
                <option value="nombre_completo-asc">Nombre (A-Z)</option>
                <option value="nombre_completo-desc">Nombre (Z-A)</option>
                <option value="empresa-asc">Empresa (A-Z)</option>
              </select>
            </div>
          </div>
        </section>

        <!-- TABLA DE CLIENTES -->
        <section class="table-container">
          <table class="crm-table">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Empresa</th>
                <th>Correo Electrónico</th>
                <th>Ciudad</th>
                <th>Fecha Registro</th>
                <th>Estado</th>
                <th style="text-align: center;">Acciones</th>
              </tr>
            </thead>
            <tbody id="clientesTableBody">
              <tr>
                <td colspan="7" class="crm-empty-state">
                  Cargando directorio de clientes...
                </td>
              </tr>
            </tbody>
          </table>
        </section>

        <!-- PAGINACIÓN -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; font-size: 0.9rem;">
          <div style="color: var(--muted);" id="paginationInfo">
            Mostrando 0 de 0 clientes
          </div>
          <div style="display: flex; gap: 0.5rem;">
            <button class="btn-neon btn-neon-secondary" id="btnPrevPage" style="padding: 0.4rem 1rem; text-transform: none; font-size: 0.8rem;">
              Anterior
            </button>
            <button class="btn-neon btn-neon-secondary" id="btnNextPage" style="padding: 0.4rem 1rem; text-transform: none; font-size: 0.8rem;">
              Siguiente
            </button>
          </div>
        </div>
      </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js?v=3" onerror="console.log('Sin config.js')"></script>
    <script src="../js/admin-common.js?v=3"></script>
    <script src="../js/admin-clientes.js?v=3"></script>
  </body>
</html>
