<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Kaleidoscopio | Acceso Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../assets/css/styles.css" />
    <link rel="stylesheet" href="../css/admin-styles.css" />
  </head>
  <body class="login-body">
    <div class="neon-particles" aria-hidden="true"></div>

    <div class="login-card">
      <div class="login-logo">
        <img src="../../assets/img/logo.jpg" alt="Kaleidoscopio Logo" />
        <div>
          <h2>Panel de Control</h2>
          <p>Ingresa la contraseña del sistema</p>
        </div>
      </div>

      <div class="login-error-msg" id="loginError">Contraseña incorrecta. Inténtalo de nuevo.</div>
      <div class="login-error-msg" id="supabaseError" style="background: rgba(255, 179, 71, 0.1); border-color: rgba(255, 179, 71, 0.3); color: #ffb347;">
        Por favor configura la conexión a Supabase primero.
      </div>

      <!-- Formulario de Login -->
      <form id="loginForm" style="display: flex; flex-direction: column; gap: 1.5rem;">
        <div class="form-group" style="margin-bottom: 0;">
          <label for="adminPassword">Contraseña</label>
          <input
            type="password"
            id="adminPassword"
            class="form-control"
            placeholder="••••••••"
            required
            autocomplete="current-password"
            style="text-align: center; font-size: 1.1rem; letter-spacing: 0.2em;"
          />
        </div>

        <button type="submit" class="btn-neon" style="justify-content: center; width: 100%;">
          Ingresar al Panel
        </button>
      </form>

      <!-- Configuración Opcional de Supabase en Caliente -->
      <div class="supabase-config-toggle" id="configToggle">
        Configurar Conexión Supabase
      </div>

      <div class="supabase-config-section" id="configSection">
        <div class="form-group">
          <label for="dbUrl">Supabase URL</label>
          <input type="url" id="dbUrl" class="form-control" placeholder="https://xxxx.supabase.co" />
        </div>
        <div class="form-group">
          <label for="dbKey">Anon / Public Key</label>
          <input type="text" id="dbKey" class="form-control" placeholder="eyJhbGciOi..." />
        </div>
        <button type="button" id="saveConfigBtn" class="btn-neon btn-neon-secondary" style="width: 100%; justify-content: center;">
          Guardar Credenciales
        </button>
      </div>
    </div>

    <!-- Scripts de carga -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- config.js se carga de forma opcional (si no existe, fallará de forma controlada sin romper la página) -->
    <script src="../js/config.js" onerror="console.log('Sin archivo config.js predefinido. Usando localStorage.')"></script>
    <script src="../js/admin-common.js"></script>

    <script>
      // Lógica de hasheo SHA-256 en navegador
      async function hashPassword(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      }

      document.addEventListener('DOMContentLoaded', () => {
        // Redirigir si ya hay una sesión válida
        if (localStorage.getItem('kali_admin_session')) {
          const path = window.location.pathname.includes('/login') ? '../' : './';
          window.location.href = path;
        }

        const loginForm = document.getElementById('loginForm');
        const adminPasswordInput = document.getElementById('adminPassword');
        const loginError = document.getElementById('loginError');
        const supabaseError = document.getElementById('supabaseError');
        const configToggle = document.getElementById('configToggle');
        const configSection = document.getElementById('configSection');
        const dbUrlInput = document.getElementById('dbUrl');
        const dbKeyInput = document.getElementById('dbKey');
        const saveConfigBtn = document.getElementById('saveConfigBtn');

        // Cargar credenciales guardadas en localStorage si existen
        dbUrlInput.value = localStorage.getItem('supabase_url') || '';
        dbKeyInput.value = localStorage.getItem('supabase_anon_key') || '';

        // Toggle para la sección de configuración
        configToggle.addEventListener('click', () => {
          configSection.classList.toggle('active');
        });

        // Guardar configuración localmente
        saveConfigBtn.addEventListener('click', () => {
          const url = dbUrlInput.value.trim();
          const key = dbKeyInput.value.trim();

          if (url && key) {
            localStorage.setItem('supabase_url', url);
            localStorage.setItem('supabase_anon_key', key);
            
            // Re-inicializar Supabase
            window.SUPABASE_URL = url;
            window.SUPABASE_ANON_KEY = key;
            
            alert('Credenciales de Supabase guardadas localmente en este navegador.');
            supabaseError.style.display = 'none';
            configSection.classList.remove('active');
          } else {
            alert('Por favor ingresa ambos campos.');
          }
        });

        // Manejar el submit del Login
        loginForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          loginError.style.display = 'none';
          supabaseError.style.display = 'none';

          const password = adminPasswordInput.value;
          
          // Asegurarse de que Supabase esté configurado
          const initialized = initSupabase();
          if (!initialized) {
            supabaseError.style.display = 'block';
            configSection.classList.add('active');
            return;
          }

          try {
            // 1. Hashear contraseña ingresada
            const hashedInput = await hashPassword(password);

            // 2. Consultar si existe en la base de datos
            const { data, error } = await supabase
              .from('admin_settings')
              .select('value')
              .eq('key', 'admin_password_hash')
              .eq('value', hashedInput)
              .maybeSingle();

            if (error) {
              console.error('Error consultando Supabase:', error);
              loginError.textContent = 'Error de conexión con la base de datos.';
              loginError.style.display = 'block';
              return;
            }

            if (data && data.value === hashedInput) {
              // Contraseña correcta: Guardar sesión
              localStorage.setItem('kali_admin_session', hashedInput);
              // Redirigir al dashboard (/admin)
              window.location.href = '../';
            } else {
              // Contraseña incorrecta
              loginError.textContent = 'Contraseña incorrecta. Inténtalo de nuevo.';
              loginError.style.display = 'block';
              adminPasswordInput.value = '';
              adminPasswordInput.focus();
            }
          } catch (error) {
            console.error('Error en login:', error);
            loginError.textContent = 'Hubo un error inesperado al procesar el login.';
            loginError.style.display = 'block';
          }
        });
      });
    </script>
  </body>
</html>
